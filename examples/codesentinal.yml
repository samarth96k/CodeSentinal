name: CodeSentinal AI Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Run CodeSentinal Review
        uses: samarth96k/CodeSentinal@v1
        with:
          mode: review
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}